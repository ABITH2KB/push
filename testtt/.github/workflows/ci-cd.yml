name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# ── Environment variables ──────────────────────────────────────────────────────
env:
  IMAGE_NAME: task-api
  PYTHON_VERSION: "3.12"

jobs:

  # ── JOB 1: Run unit tests ────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage


  # ── JOB 2: Build Docker image ────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test                   # Only runs if tests pass ✅

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Smoke test the container
        run: |
          # Start container in background
          docker run -d \
            --name test-container \
            -p 5000:5000 \
            ${{ env.IMAGE_NAME }}:latest

          # Wait for it to be ready
          sleep 3

          # Hit the health endpoint
          curl --fail http://localhost:5000/health || \
            (docker logs test-container && exit 1)

          echo "✅ Container is healthy!"
          docker stop test-container

      - name: Push to Docker Hub
        # Only push on pushes to main (not PRs)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

          echo "✅ Pushed ${{ env.IMAGE_NAME }}:${{ github.sha }}"


  # ── JOB 3: Deploy to server ───────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build            # Only runs if Docker build passes ✅
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🔄 Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "⏹  Stopping old container..."
            docker stop task-api || true
            docker rm task-api || true

            echo "▶  Starting new container..."
            docker run -d \
              --name task-api \
              --restart unless-stopped \
              -p 80:5000 \
              ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "🔍 Health check..."
            sleep 3
            curl --fail http://localhost/health

            echo "✅ Deployed successfully!"